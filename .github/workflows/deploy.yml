name: Deploy API

on: 
  push:
    branches: 
      - main
    pull_request:
      branches: 
        - main

jobs:
  build:
    run-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
      - run: npm install

    deploy:
      needs: build
      runs-on: ubuntu-latest
      steps:
        - run: curl -X POST "${{ secrets.RENDER_HOOK_URL }}"
